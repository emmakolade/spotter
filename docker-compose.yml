version: '3.8'

services:
  db:
    image: postgis/postgis:16-3.4
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=spotter_db
      - POSTGRES_USER=spotter_user
      - POSTGRES_PASSWORD=spotter_password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spotter_user -d spotter_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    command: gunicorn spotter_project.wsgi:application --bind 0.0.0.0:8000 --reload
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgis://spotter_user:spotter_password@db:5432/spotter_db
      - SECRET_KEY=django-insecure-your-secret-key-here
      - DEBUG=1
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
